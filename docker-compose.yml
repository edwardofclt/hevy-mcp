services:
  hevy-mcp:
    build: .
    image: hevy-mcp:local
    restart: unless-stopped
    ports:
      - "${HEVY_MCP_PORT:-3000}:3000"
    environment:
      HEVY_API_KEY: ${HEVY_API_KEY:?HEVY_API_KEY is required}
      MCP_CLIENT_ID: ${MCP_CLIENT_ID:?MCP_CLIENT_ID is required}
      MCP_CLIENT_SECRET: ${MCP_CLIENT_SECRET:?MCP_CLIENT_SECRET is required}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
